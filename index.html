  <!-- Critical inline CSS for instant render -->
  <style>
    *,::after,::before{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:Outfit,system-ui,-apple-system,sans-serif;background:#F0F4F8;color:#0f172a;overflow-x:hidden}
    #hero-skeleton{position:relative;padding:6rem 1rem 3rem;text-align:center;min-height:100svh;display:flex;flex-direction:column;justify-content:center;align-items:center}
    #hero-skeleton h1{font-size:clamp(2.5rem,10vw,7rem);font-weight:900;line-height:.95;letter-spacing:-.04em;margin:0 0 1.25rem;color:#0f172a}
    #hero-skeleton .gradient-text{background:linear-gradient(135deg,#2563eb,#4f46e5,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    #hero-skeleton p{font-size:clamp(1rem,2.5vw,1.5rem);color:#475569;max-width:48rem;margin:0 auto 2.5rem;line-height:1.6;font-weight:500}
    #hero-skeleton .nav-bar{position:fixed;top:1.75rem;left:0;right:0;z-index:50;display:flex;justify-content:center}
    #hero-skeleton .nav-logo{font-size:2rem;font-weight:900;letter-spacing:-.05em;text-transform:uppercase;color:#0f172a;text-decoration:none}
    #hero-skeleton .nav-logo span{color:#2563eb}
    #root:not(:empty)+*{display:none}
  </style>
</head>

<body>
  <!-- Inline hero renders instantly before React boots — improves FCP dramatically -->
  <div id="hero-skeleton" aria-hidden="true">
    <nav class="nav-bar">
      <a class="nav-logo" href="/">DM<span>.</span>LEADS</a>
    </nav>
    <h1>Лиды на недвижимость<br><span class="gradient-text">Высшего Класса</span></h1>
    <p>Мы не продаем контакты. Мы поставляем <strong>готовых к сделке клиентов</strong>, квалифицированных по всем параметрам и ожидающих звонка от вашего брокера.</p>
  </div>

  <div id="root"></div>
  <script>
    // Remove skeleton as soon as React has mounted
    document.addEventListener('DOMContentLoaded', function() {
      var observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          var s = document.getElementById('hero-skeleton');
          if (s) s.style.display = 'none';
          observer.disconnect();
        }
      });
      var root = document.getElementById('root');
      if (root) observer.observe(root, { childList: true, subtree: false });
    });
  </script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
